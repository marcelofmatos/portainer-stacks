# Stack "postgres-pgvector" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  postgres:
    restart: unless-stopped
    image: pgvector/pgvector:${PGVECTOR_IMAGE_TAG:-pg16}
    networks:
    - data
    environment:
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - POSTGRES_DB=${POSTGRES_DB:-vectordb}
    - POSTGRES_USER=${POSTGRES_USER:-postgres}
    volumes:
    - pg-data:/var/lib/postgresql/data
networks:
  data:
    external: true
    name: ${DATA_NET:-data}
volumes:
  pg-data:
    driver: local
