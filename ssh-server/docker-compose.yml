# Stack "ssh-server" — OpenSSH Server (SSH/SFTP) — Docker Swarm
# Serviço de acesso SSH/SFTP (imagem linuxserver). NÃO usa Traefik (SSH é TCP, não HTTP):
# publica a porta no nó. Prefira autenticação por chave pública (SSH_PUBLIC_KEY).
#
# Obrigatórias: SSH_USER. Recomendado: SSH_PUBLIC_KEY (ou habilite senha com SSH_PASSWORD_ACCESS=true).
# NOTA (volume em Swarm): o volume /config é local ao nó — em cluster multi-worker fixe o serviço
# definindo WORKER_HOSTNAME e descomentando o constraint de hostname.
services:
  ssh:
    image: lscr.io/linuxserver/openssh-server:${SSH_IMAGE_TAG:-latest}
    hostname: ${SSH_HOSTNAME:-ssh-server}
    networks:
      - default
    ports:
      - target: 2222
        published: ${SSH_PORT:-2222}
        mode: host
    environment:
      - PUID=${SSH_PUID:-1000}
      - PGID=${SSH_PGID:-1000}
      - TZ=${TZ:-America/Sao_Paulo}
      - USER_NAME=${SSH_USER:-sftp}
      - PUBLIC_KEY=${SSH_PUBLIC_KEY:-}
      - SUDO_ACCESS=${SSH_SUDO_ACCESS:-false}
      - PASSWORD_ACCESS=${SSH_PASSWORD_ACCESS:-false}
      - USER_PASSWORD=${SSH_USER_PASSWORD:-}
    volumes:
      - ssh-config:/config
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}

networks:
  default:
    driver: overlay

volumes:
  ssh-config:
    driver: local
