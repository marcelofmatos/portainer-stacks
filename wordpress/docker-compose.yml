# Stack "wordpress" — WordPress (Docker Swarm)
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt.
# Usa o MariaDB compartilhado (stack `mariadb`) na rede `data` — não sobe banco próprio.
#
# NOTA (volume em Swarm): em cluster multi-worker fixe o serviço definindo WORKER_HOSTNAME e
# descomentando o constraint de hostname.
services:
  wordpress:
    image: wordpress:${WORDPRESS_IMAGE_TAG:-php8.3-apache}
    networks:
      - default
      - web
      - data
    environment:
      - WORDPRESS_DB_HOST=${WORDPRESS_DB_HOST:-mariadb}
      - WORDPRESS_DB_NAME=${WORDPRESS_DB_NAME:-wordpress}
      - WORDPRESS_DB_USER=${WORDPRESS_DB_USER:-wordpress}
      - WORDPRESS_DB_PASSWORD=${WORDPRESS_DB_PASSWORD}
      - WORDPRESS_TABLE_PREFIX=${WORDPRESS_TABLE_PREFIX:-wp_}
      - WORDPRESS_CONFIG_EXTRA=${WORDPRESS_CONFIG_EXTRA:-}
    volumes:
      - wordpress-data:/var/www/html
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}
      labels:
        - traefik.enable=true
        - traefik.http.routers.wordpress.rule=Host(`${WORDPRESS_FQDN}`)
        - traefik.http.routers.wordpress.entrypoints=websecure
        - traefik.http.routers.wordpress.tls=true
        - traefik.http.routers.wordpress.tls.certresolver=letsencryptresolver
        - traefik.http.services.wordpress.loadbalancer.server.port=80

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: overlay

volumes:
  wordpress-data:
    driver: local
