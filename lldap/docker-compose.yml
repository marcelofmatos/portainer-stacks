# Stack "lldap" — Light LDAP (diretório LDAP leve) + UI web (Docker Swarm)
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
# Expõe a rede externa `ldap` para outras stacks autenticarem (host: lldap_server:3890).
#
# Toda customização é feita por variáveis de ambiente (ver README e bloco abaixo).
# Obrigatórias: LLDAP_FQDN, LLDAP_JWT_SECRET, LLDAP_KEY_SEED, LLDAP_ADMIN_PASSWORD.
#
# NOTA (volumes em Swarm): o volume é local ao nó. Em cluster com mais de um worker,
# fixe o serviço definindo WORKER_HOSTNAME e descomentando o constraint de hostname.

services:

  server:
    image: lldap/lldap:${LLDAP_IMAGE_TAG:-stable}
    environment:
      - TZ=${TZ:-UTC}
      - LLDAP_JWT_SECRET=${LLDAP_JWT_SECRET}
      - LLDAP_KEY_SEED=${LLDAP_KEY_SEED}
      - LLDAP_LDAP_BASE_DN=${LLDAP_BASE_DN:-dc=example,dc=com}
      - LLDAP_LDAP_USER_DN=${LLDAP_ADMIN_USERNAME:-admin}
      - LLDAP_LDAP_USER_PASS=${LLDAP_ADMIN_PASSWORD}
    volumes:
      - lldap-data:/data
    networks:
      - default
      - web
      - ldap
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}   # fixe em multi-worker (volume local ao nó)
      labels:
        - traefik.enable=true
        - traefik.http.routers.lldap.rule=Host(`${LLDAP_FQDN}`)
        - traefik.http.routers.lldap.entrypoints=websecure
        - traefik.http.routers.lldap.tls=true
        - traefik.http.routers.lldap.tls.certresolver=letsencryptresolver
        - traefik.http.services.lldap.loadbalancer.server.port=17170

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  ldap:
    external: true
    name: ${LDAP_NET:-ldap}
  default:
    driver: overlay

volumes:
  lldap-data:
    driver: local
