# Stack "mongo-express" — Mongo Express (admin web do MongoDB) — Docker Swarm
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
# Conecta no MongoDB compartilhado (stack `mongodb`) na rede `data`. Protegido por basicauth próprio.
#
# Obrigatórias: MONGOEXPRESS_FQDN, MONGOEXPRESS_MONGO_PASSWORD, MONGOEXPRESS_PASSWORD.
# Porte: Leve (64 MB → 512 MB RAM)
# Hardware (1 réplica): mínimo 0.5 vCPU · 256 MB RAM · 2 GB disco · ideal 1 vCPU · 512 MB RAM · 5 GB disco
services:
  mongo-express:
    image: mongo-express:${MONGO_EXPRESS_IMAGE_TAG:-1.0.2}
    networks:
      - default
      - web
      - data
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGOEXPRESS_MONGO_USER:-root}:${MONGOEXPRESS_MONGO_PASSWORD}@${MONGOEXPRESS_MONGO_HOST:-mongodb}:${MONGOEXPRESS_MONGO_PORT:-27017}/?authSource=admin
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGOEXPRESS_USERNAME:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGOEXPRESS_PASSWORD}
      - ME_CONFIG_SITE_BASEURL=/
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - traefik.enable=true
        - traefik.http.routers.mongo-express.rule=Host(`${MONGOEXPRESS_FQDN}`)
        - traefik.http.routers.mongo-express.entrypoints=websecure
        - traefik.http.routers.mongo-express.tls=true
        - traefik.http.routers.mongo-express.tls.certresolver=letsencryptresolver
        - traefik.http.services.mongo-express.loadbalancer.server.port=8081

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: overlay
