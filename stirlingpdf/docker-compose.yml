# Stack "stirlingpdf" — Stirling-PDF (Docker Swarm)
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
# Stirling-PDF: suite local de ferramentas de PDF (converter, mesclar, dividir, OCR, assinar, etc.).
#
# Toda customização é feita por variáveis de ambiente (ver README e bloco abaixo).
# Obrigatória: STIRLING_FQDN.
#
# NOTA (volumes em Swarm): os volumes são locais ao nó. Em cluster com mais de um worker,
# fixe o serviço definindo WORKER_HOSTNAME e descomentando o constraint de hostname,
# senão a configuração (/configs) e as fontes customizadas podem "sumir" ao reagendar o serviço.
# Hardware (1 réplica): mínimo 1 vCPU · 1 GB RAM · 5 GB disco · ideal 2 vCPU · 2 GB RAM · 10 GB disco
services:
  stirling:
    image: frooodle/s-pdf:${STIRLING_IMAGE_TAG:-latest}
    environment:
      - DOCKER_ENABLE_SECURITY=${STIRLING_ENABLE_SECURITY:-false}
      - LANGS=${STIRLING_LANGS:-pt_BR,en_US}
    networks:
      - default
      - web
    volumes:
      - configs:/configs
      - fonts:/usr/share/fonts/opentype/custom
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}
      labels:
        - traefik.enable=true
        - traefik.http.routers.stirling.rule=Host(`${STIRLING_FQDN}`)
        - traefik.http.routers.stirling.entrypoints=websecure
        - traefik.http.routers.stirling.tls=true
        - traefik.http.routers.stirling.tls.certresolver=letsencryptresolver
        - traefik.http.services.stirling.loadbalancer.server.port=8080

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: overlay

volumes:
  configs:
    driver: local
  fonts:
    driver: local
