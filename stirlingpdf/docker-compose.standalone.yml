# Stack "stirlingpdf" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  stirling:
    restart: unless-stopped
    image: frooodle/s-pdf:${STIRLING_IMAGE_TAG:-latest}
    environment:
    - DOCKER_ENABLE_SECURITY=${STIRLING_ENABLE_SECURITY:-false}
    - LANGS=${STIRLING_LANGS:-pt_BR,en_US}
    networks:
    - default
    - web
    volumes:
    - configs:/configs
    - fonts:/usr/share/fonts/opentype/custom
    labels:
    - traefik.enable=true
    - traefik.http.routers.stirling.rule=Host(`${STIRLING_FQDN}`)
    - traefik.http.routers.stirling.entrypoints=websecure
    - traefik.http.routers.stirling.tls=true
    - traefik.http.routers.stirling.tls.certresolver=letsencryptresolver
    - traefik.http.services.stirling.loadbalancer.server.port=8080
    - caddy=${STIRLING_FQDN}
    - caddy.reverse_proxy={{upstreams 8080}}
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  configs:
    driver: local
  fonts:
    driver: local
