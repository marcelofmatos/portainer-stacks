# Stack "searxng" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  searxng:
    restart: unless-stopped
    image: searxng/searxng:${SEARXNG_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    - data
    environment:
    - SEARXNG_BASE_URL=https://${SEARXNG_FQDN}/
    - SEARXNG_SECRET=${SEARXNG_SECRET}
    - SEARXNG_REDIS_URL=${SEARXNG_REDIS_URL:-}
    volumes:
    - searxng-config:/etc/searxng
    labels:
    - traefik.enable=true
    - traefik.http.routers.searxng.rule=Host(`${SEARXNG_FQDN}`)
    - traefik.http.routers.searxng.entrypoints=websecure
    - traefik.http.routers.searxng.tls=true
    - traefik.http.routers.searxng.tls.certresolver=letsencryptresolver
    - traefik.http.services.searxng.loadbalancer.server.port=8080
    - caddy=${SEARXNG_FQDN}
    - caddy.reverse_proxy={{upstreams 8080}}
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: bridge
volumes:
  searxng-config:
    driver: local
