# Stack "phpmyadmin" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  pma:
    restart: unless-stopped
    image: phpmyadmin/phpmyadmin:${PMA_IMAGE_TAG:-latest}
    environment:
      PMA_ARBITRARY: 1
      PMA_HOSTS: ${PMA_HOSTS:-mariadb}
      PMA_ABSOLUTE_URI: https://${PMA_FQDN}/
      UPLOAD_LIMIT: ${PMA_UPLOAD_LIMIT:-256M}
    networks:
    - web
    - data
    labels:
    - traefik.enable=true
    - traefik.http.routers.pma.rule=Host(`${PMA_FQDN}`)
    - traefik.http.routers.pma.entrypoints=websecure
    - traefik.http.routers.pma.tls=true
    - traefik.http.routers.pma.tls.certresolver=letsencryptresolver
    - traefik.http.services.pma.loadbalancer.server.port=80
    - caddy=${PMA_FQDN}
    - caddy.reverse_proxy={{upstreams 80}}
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
