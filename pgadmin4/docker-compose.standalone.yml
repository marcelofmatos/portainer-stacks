# Stack "pgadmin4" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  pgadmin:
    restart: unless-stopped
    image: dpage/pgadmin4:${PGADMIN_IMAGE_TAG:-latest}
    environment:
    - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
    - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    - PGADMIN_LISTEN_PORT=80
    volumes:
    - pgadmin:/var/lib/pgadmin
    networks:
    - default
    - web
    labels:
    - traefik.enable=true
    - traefik.http.routers.pgadmin.rule=Host(`${PGADMIN_FQDN}`)
    - traefik.http.routers.pgadmin.entrypoints=websecure
    - traefik.http.routers.pgadmin.tls=true
    - traefik.http.routers.pgadmin.tls.certresolver=letsencryptresolver
    - traefik.http.services.pgadmin.loadbalancer.server.port=80
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  pgadmin:
    driver: local
