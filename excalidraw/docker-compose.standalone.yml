# Stack "excalidraw" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  excalidraw:
    restart: unless-stopped
    image: excalidraw/excalidraw:${EXCALIDRAW_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    labels:
    - traefik.enable=true
    - traefik.http.routers.excalidraw.rule=Host(`${EXCALIDRAW_FQDN}`)
    - traefik.http.routers.excalidraw.entrypoints=websecure
    - traefik.http.routers.excalidraw.tls=true
    - traefik.http.routers.excalidraw.tls.certresolver=letsencryptresolver
    - traefik.http.services.excalidraw.loadbalancer.server.port=80
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
