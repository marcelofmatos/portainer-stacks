# Stack "excalidraw" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  excalidraw:
    restart: unless-stopped
    image: excalidraw/excalidraw:${EXCALIDRAW_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    labels:
    - traefik.enable=true
    - traefik.http.routers.excalidraw.rule=Host(`${EXCALIDRAW_FQDN}`)
    - traefik.http.routers.excalidraw.entrypoints=websecure
    - traefik.http.routers.excalidraw.tls=true
    - traefik.http.routers.excalidraw.tls.certresolver=letsencryptresolver
    - traefik.http.services.excalidraw.loadbalancer.server.port=80
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
