# Stack "open-webui" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  open-webui:
    restart: unless-stopped
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_IMAGE_TAG:-main}
    networks:
    - default
    - web
    environment:
    - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET_KEY}
    - WEBUI_URL=https://${OPENWEBUI_FQDN}
    - OLLAMA_BASE_URL=${OPENWEBUI_OLLAMA_URL:-}
    - OPENAI_API_BASE_URL=${OPENWEBUI_OPENAI_BASE_URL:-}
    - OPENAI_API_KEY=${OPENWEBUI_OPENAI_API_KEY:-}
    - ENABLE_SIGNUP=${OPENWEBUI_ENABLE_SIGNUP:-false}
    volumes:
    - open-webui-data:/app/backend/data
    labels:
    - traefik.enable=true
    - traefik.http.routers.open-webui.rule=Host(`${OPENWEBUI_FQDN}`)
    - traefik.http.routers.open-webui.entrypoints=websecure
    - traefik.http.routers.open-webui.tls=true
    - traefik.http.routers.open-webui.tls.certresolver=letsencryptresolver
    - traefik.http.services.open-webui.loadbalancer.server.port=8080
    - caddy=${OPENWEBUI_FQDN}
    - caddy.reverse_proxy={{upstreams 8080}}
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  open-webui-data:
    driver: local
