# Stack "ollama" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  ollama:
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    environment:
    - OLLAMA_HOST=0.0.0.0:11434
    - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
    - ollama-data:/root/.ollama
    networks:
    - default
    - web
    labels:
    - traefik.enable=true
    - traefik.http.routers.ollama.rule=Host(`${OLLAMA_FQDN}`)
    - traefik.http.routers.ollama.entrypoints=websecure
    - traefik.http.routers.ollama.tls=true
    - traefik.http.routers.ollama.tls.certresolver=letsencryptresolver
    - traefik.http.services.ollama.loadbalancer.server.port=11434
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  ollama-data:
    driver: local
