# Stack "ollama" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  ollama:
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    environment:
    - OLLAMA_HOST=0.0.0.0:11434
    - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
    - ollama-data:/root/.ollama
    networks:
    - default
    - web
    labels:
    - traefik.enable=true
    - traefik.http.routers.ollama.rule=Host(`${OLLAMA_FQDN}`)
    - traefik.http.routers.ollama.entrypoints=websecure
    - traefik.http.routers.ollama.tls=true
    - traefik.http.routers.ollama.tls.certresolver=letsencryptresolver
    - traefik.http.services.ollama.loadbalancer.server.port=11434
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  ollama-data:
    driver: local
