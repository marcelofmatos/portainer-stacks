# Stack "typebot" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  builder:
    restart: unless-stopped
    image: baptistearno/typebot-builder:${TYPEBOT_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    environment:
    - DATABASE_URL=postgresql://${TYPEBOT_DB_USER:-postgres}:${TYPEBOT_DB_PASSWORD}@${TYPEBOT_DB_HOST:-db}:${TYPEBOT_DB_PORT:-5432}/${TYPEBOT_DB_NAME:-typebot}
    - ENCRYPTION_SECRET=${TYPEBOT_ENCRYPTION_SECRET}
    - NEXTAUTH_URL=https://${TYPEBOT_BUILDER_FQDN}
    - NEXT_PUBLIC_VIEWER_URL=https://${TYPEBOT_VIEWER_FQDN}
    - ADMIN_EMAIL=${TYPEBOT_ADMIN_EMAIL:-}
    - DISABLE_SIGNUP=${TYPEBOT_DISABLE_SIGNUP:-true}
    - S3_ACCESS_KEY=${TYPEBOT_S3_ACCESS_KEY:-}
    - S3_SECRET_KEY=${TYPEBOT_S3_SECRET_KEY:-}
    - S3_BUCKET=${TYPEBOT_S3_BUCKET:-typebot}
    - S3_ENDPOINT=${TYPEBOT_S3_ENDPOINT:-}
    - S3_PORT=${TYPEBOT_S3_PORT:-443}
    - S3_SSL=${TYPEBOT_S3_SSL:-true}
    labels:
    - traefik.enable=true
    - traefik.http.routers.typebot-builder.rule=Host(`${TYPEBOT_BUILDER_FQDN}`)
    - traefik.http.routers.typebot-builder.entrypoints=websecure
    - traefik.http.routers.typebot-builder.tls=true
    - traefik.http.routers.typebot-builder.tls.certresolver=letsencryptresolver
    - traefik.http.services.typebot-builder.loadbalancer.server.port=3000
    - traefik.docker.network=${PROXY_NET:-web}
  viewer:
    restart: unless-stopped
    image: baptistearno/typebot-viewer:${TYPEBOT_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    environment:
    - DATABASE_URL=postgresql://${TYPEBOT_DB_USER:-postgres}:${TYPEBOT_DB_PASSWORD}@${TYPEBOT_DB_HOST:-db}:${TYPEBOT_DB_PORT:-5432}/${TYPEBOT_DB_NAME:-typebot}
    - ENCRYPTION_SECRET=${TYPEBOT_ENCRYPTION_SECRET}
    - NEXTAUTH_URL=https://${TYPEBOT_BUILDER_FQDN}
    - NEXT_PUBLIC_VIEWER_URL=https://${TYPEBOT_VIEWER_FQDN}
    - S3_ACCESS_KEY=${TYPEBOT_S3_ACCESS_KEY:-}
    - S3_SECRET_KEY=${TYPEBOT_S3_SECRET_KEY:-}
    - S3_BUCKET=${TYPEBOT_S3_BUCKET:-typebot}
    - S3_ENDPOINT=${TYPEBOT_S3_ENDPOINT:-}
    - S3_PORT=${TYPEBOT_S3_PORT:-443}
    - S3_SSL=${TYPEBOT_S3_SSL:-true}
    labels:
    - traefik.enable=true
    - traefik.http.routers.typebot-viewer.rule=Host(`${TYPEBOT_VIEWER_FQDN}`)
    - traefik.http.routers.typebot-viewer.entrypoints=websecure
    - traefik.http.routers.typebot-viewer.tls=true
    - traefik.http.routers.typebot-viewer.tls.certresolver=letsencryptresolver
    - traefik.http.services.typebot-viewer.loadbalancer.server.port=3000
    - traefik.docker.network=${PROXY_NET:-web}
  db:
    restart: unless-stopped
    image: postgres:${TYPEBOT_DB_IMAGE_TAG:-16-alpine}
    networks:
    - default
    - data
    environment:
    - POSTGRES_DB=${TYPEBOT_DB_NAME:-typebot}
    - POSTGRES_USER=${TYPEBOT_DB_USER:-postgres}
    - POSTGRES_PASSWORD=${TYPEBOT_DB_PASSWORD}
    volumes:
    - db-data:/var/lib/postgresql/data
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: bridge
volumes:
  db-data:
    driver: local
