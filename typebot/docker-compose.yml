# Stack "typebot" — Typebot (construtor de chatbots) + PostgreSQL embarcado — Docker Swarm
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
# Sobe o próprio PostgreSQL (serviço `db`) — NÃO usa o postgres-pgvector compartilhado.
#
# Dois apps: `builder` (editor de fluxos, BUILDER_FQDN) e `viewer` (runtime publicado, VIEWER_FQDN).
# Ambos falam com o banco `db` pela rede interna `default`. O `db` fica TAMBÉM na rede `data` SÓ
# para ferramentas de admin (pgadmin4) o alcançarem como `typebot_db`.
# Armazenamento de mídia opcional via MinIO (S3) — preencha as variáveis TYPEBOT_S3_* (ver README).
#
# VOLUME EM SWARM: volumes são locais ao nó. Em cluster com +1 worker, fixe o serviço `db` no nó
# definindo WORKER_HOSTNAME e descomentando o constraint `node.hostname` abaixo.
# Porte: Médio (512 MB → 2 GB RAM)
# Hardware (1 réplica): mínimo 1 vCPU · 1 GB RAM · 10 GB disco · ideal 2 vCPU · 2 GB RAM · 20 GB disco
services:
  builder:
    image: baptistearno/typebot-builder:${TYPEBOT_IMAGE_TAG:-latest}
    networks:
      - default # conversa com o banco `db` internamente
      - web # exposto pelo Traefik
    environment:
      - DATABASE_URL=postgresql://${TYPEBOT_DB_USER:-postgres}:${TYPEBOT_DB_PASSWORD}@${TYPEBOT_DB_HOST:-db}:${TYPEBOT_DB_PORT:-5432}/${TYPEBOT_DB_NAME:-typebot}
      - ENCRYPTION_SECRET=${TYPEBOT_ENCRYPTION_SECRET}
      - NEXTAUTH_URL=https://${TYPEBOT_BUILDER_FQDN}
      - NEXT_PUBLIC_VIEWER_URL=https://${TYPEBOT_VIEWER_FQDN}
      - ADMIN_EMAIL=${TYPEBOT_ADMIN_EMAIL:-}
      - DISABLE_SIGNUP=${TYPEBOT_DISABLE_SIGNUP:-true}
      - S3_ACCESS_KEY=${TYPEBOT_S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${TYPEBOT_S3_SECRET_KEY:-}
      - S3_BUCKET=${TYPEBOT_S3_BUCKET:-typebot}
      - S3_ENDPOINT=${TYPEBOT_S3_ENDPOINT:-}
      - S3_PORT=${TYPEBOT_S3_PORT:-443}
      - S3_SSL=${TYPEBOT_S3_SSL:-true}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - traefik.enable=true
        - traefik.http.routers.typebot-builder.rule=Host(`${TYPEBOT_BUILDER_FQDN}`)
        - traefik.http.routers.typebot-builder.entrypoints=websecure
        - traefik.http.routers.typebot-builder.tls=true
        - traefik.http.routers.typebot-builder.tls.certresolver=letsencryptresolver
        - traefik.http.services.typebot-builder.loadbalancer.server.port=3000

  viewer:
    image: baptistearno/typebot-viewer:${TYPEBOT_IMAGE_TAG:-latest}
    networks:
      - default # conversa com o banco `db` internamente
      - web # exposto pelo Traefik
    environment:
      - DATABASE_URL=postgresql://${TYPEBOT_DB_USER:-postgres}:${TYPEBOT_DB_PASSWORD}@${TYPEBOT_DB_HOST:-db}:${TYPEBOT_DB_PORT:-5432}/${TYPEBOT_DB_NAME:-typebot}
      - ENCRYPTION_SECRET=${TYPEBOT_ENCRYPTION_SECRET}
      - NEXTAUTH_URL=https://${TYPEBOT_BUILDER_FQDN}
      - NEXT_PUBLIC_VIEWER_URL=https://${TYPEBOT_VIEWER_FQDN}
      - S3_ACCESS_KEY=${TYPEBOT_S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${TYPEBOT_S3_SECRET_KEY:-}
      - S3_BUCKET=${TYPEBOT_S3_BUCKET:-typebot}
      - S3_ENDPOINT=${TYPEBOT_S3_ENDPOINT:-}
      - S3_PORT=${TYPEBOT_S3_PORT:-443}
      - S3_SSL=${TYPEBOT_S3_SSL:-true}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - traefik.enable=true
        - traefik.http.routers.typebot-viewer.rule=Host(`${TYPEBOT_VIEWER_FQDN}`)
        - traefik.http.routers.typebot-viewer.entrypoints=websecure
        - traefik.http.routers.typebot-viewer.tls=true
        - traefik.http.routers.typebot-viewer.tls.certresolver=letsencryptresolver
        - traefik.http.services.typebot-viewer.loadbalancer.server.port=3000

  # Banco de dados PRÓPRIO da stack (não compartilhe com outras stacks).
  db:
    image: postgres:${TYPEBOT_DB_IMAGE_TAG:-16-alpine}
    networks:
      - default # acesso dos apps
      - data # SÓ para ferramentas de admin (pgadmin4) via host `typebot_db`
    environment:
      - POSTGRES_DB=${TYPEBOT_DB_NAME:-typebot}
      - POSTGRES_USER=${TYPEBOT_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${TYPEBOT_DB_PASSWORD} # OBRIGATÓRIA
    volumes:
      - db-data:/var/lib/postgresql/data # ← copie este volume para migrar de host
    deploy:
      placement:
        constraints:
          - node.role == worker
          # fixe o db no nó em cluster multi-worker:
          # - node.hostname == ${WORKER_HOSTNAME:-}

networks:
  web: # externa: criada pela stack balancer (Traefik)
    external: true
    name: ${PROXY_NET:-web}
  data: # externa: liga o banco às ferramentas de admin (pgadmin4 etc.)
    external: true
    name: ${DATA_NET:-data}
  default: # interna desta stack: apps <-> db
    driver: overlay

volumes:
  db-data:
    driver: local
