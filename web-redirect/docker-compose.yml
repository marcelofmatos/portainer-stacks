# Stack "web-redirect" — redirecionador HTTP — Docker Swarm
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
# Redireciona todo o tráfego de um domínio para uma URL de destino (301/302). Útil para domínios
# antigos, encurtadores simples ou apontar um host para outro serviço.
#
# Obrigatórias: REDIRECT_FQDN, REDIRECT_TARGET.
# Hardware (1 réplica): mínimo 0.25 vCPU · 64 MB RAM · 1 GB disco · ideal 0.5 vCPU · 128 MB RAM · 2 GB disco
services:
  web-redirect:
    image: morbz/docker-web-redirect:${REDIRECT_IMAGE_TAG:-latest}
    networks:
      - default
      - web
    environment:
      - REDIRECT_TARGET=${REDIRECT_TARGET}
      # REDIRECT_TYPE: "redirect" (302 temporário) ou "redirect permanent" (301)
      - REDIRECT_TYPE=${REDIRECT_TYPE:-redirect}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - traefik.enable=true
        - traefik.http.routers.web-redirect.rule=Host(`${REDIRECT_FQDN}`)
        - traefik.http.routers.web-redirect.entrypoints=websecure
        - traefik.http.routers.web-redirect.tls=true
        - traefik.http.routers.web-redirect.tls.certresolver=letsencryptresolver
        - traefik.http.services.web-redirect.loadbalancer.server.port=80

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: overlay
