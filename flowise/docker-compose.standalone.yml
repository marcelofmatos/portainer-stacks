# Stack "flowise" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  flowise:
    restart: unless-stopped
    image: flowiseai/flowise:${FLOWISE_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    environment:
    - PORT=3000
    - FLOWISE_USERNAME=${FLOWISE_USERNAME:-admin}
    - FLOWISE_PASSWORD=${FLOWISE_PASSWORD}
    - DATABASE_PATH=/root/.flowise
    - APIKEY_PATH=/root/.flowise
    - SECRETKEY_PATH=/root/.flowise
    - LOG_PATH=/root/.flowise/logs
    - BLOB_STORAGE_PATH=/root/.flowise/storage
    volumes:
    - flowise-data:/root/.flowise
    labels:
    - traefik.enable=true
    - traefik.http.routers.flowise.rule=Host(`${FLOWISE_FQDN}`)
    - traefik.http.routers.flowise.entrypoints=websecure
    - traefik.http.routers.flowise.tls=true
    - traefik.http.routers.flowise.tls.certresolver=letsencryptresolver
    - traefik.http.services.flowise.loadbalancer.server.port=3000
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  flowise-data:
    driver: local
