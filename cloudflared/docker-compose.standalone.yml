# Stack "cloudflared" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  tunnel:
    restart: unless-stopped
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:-latest}
    command: tunnel --no-autoupdate run
    networks:
    - web
    environment:
    - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
