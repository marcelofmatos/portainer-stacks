# Stack "openspeedtest" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  openspeedtest:
    restart: unless-stopped
    image: openspeedtest/latest:${OPENSPEEDTEST_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    labels:
    - traefik.enable=true
    - traefik.http.routers.openspeedtest.rule=Host(`${OPENSPEEDTEST_FQDN}`)
    - traefik.http.routers.openspeedtest.entrypoints=websecure
    - traefik.http.routers.openspeedtest.tls=true
    - traefik.http.routers.openspeedtest.tls.certresolver=letsencryptresolver
    - traefik.http.services.openspeedtest.loadbalancer.server.port=3000
    - caddy=${OPENSPEEDTEST_FQDN}
    - caddy.reverse_proxy={{upstreams 3000}}
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
