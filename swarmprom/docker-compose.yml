# Stack "swarmprom" — monitoramento de Docker Swarm (Docker Swarm)
# Baseado no projeto stefanprodan/swarmprom (https://github.com/stefanprodan/swarmprom),
# com TAGS MODERNIZADAS (todas em :latest por padrao, parametrizaveis).
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
#
# EXPOE SOMENTE o Grafana via Traefik. Prometheus, Alertmanager, node-exporter e cAdvisor
# ficam APENAS na rede interna `default` (overlay).
#
# Toda customizacao e feita por variaveis de ambiente (ver README e blocos abaixo).
# Obrigatorias: SWARMPROM_GRAFANA_FQDN, GRAFANA_ADMIN_PASSWORD.
#
# NOTA (volumes em Swarm): os volumes (prometheus, grafana, alertmanager) sao locais ao no.
# Em cluster com mais de um worker, fixe esses servicos definindo WORKER_HOSTNAME e
# descomentando o constraint de hostname, senao os dados "pulam" de no a cada reagendamento.
#
# NOTA (config adicional): Prometheus e Grafana sobem com config minima inline (flags/env).
# Para scrape de Swarm, regras de alerta, datasources e dashboards prontos, monte arquivos
# de configuracao adicionais — veja o README e o projeto stefanprodan/swarmprom como referencia.
services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG:-latest}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    volumes:
      - prometheus:/prometheus
    networks:
      - default
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}
          # NOTA: volume local ao no — fixe o hostname em cluster multi-worker.

  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_IMAGE_TAG:-latest}
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - alertmanager:/alertmanager
    networks:
      - default
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}
          # NOTA: volume local ao no — fixe o hostname em cluster multi-worker.

  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG:-latest}
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${SWARMPROM_GRAFANA_FQDN}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana:/var/lib/grafana
    networks:
      - default
      - web
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}
          # NOTA: volume local ao no — fixe o hostname em cluster multi-worker.
      labels:
        - traefik.enable=true
        - traefik.http.routers.swarmprom-grafana.rule=Host(`${SWARMPROM_GRAFANA_FQDN}`)
        - traefik.http.routers.swarmprom-grafana.entrypoints=websecure
        - traefik.http.routers.swarmprom-grafana.tls=true
        - traefik.http.routers.swarmprom-grafana.tls.certresolver=letsencryptresolver
        - traefik.http.services.swarmprom-grafana.loadbalancer.server.port=3000

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_IMAGE_TAG:-latest}
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    networks:
      - default
    deploy:
      mode: global
      # mode global: roda em TODOS os nos (manager + workers) para coletar metricas do host.
      # Por isso NAO se aplica constraint node.role == worker aqui.

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_IMAGE_TAG:-latest}
    command:
      - --docker_only=true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - default
    deploy:
      mode: global
      # mode global: roda em TODOS os nos para coletar metricas de containers.
      # Por isso NAO se aplica constraint node.role == worker aqui.

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: overlay

volumes:
  prometheus:
    driver: local
  grafana:
    driver: local
  alertmanager:
    driver: local
