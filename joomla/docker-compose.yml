# Stack "joomla" — Joomla (CMS) + MySQL (Docker Swarm)
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
#
# Toda customização é feita por variáveis de ambiente (ver README e bloco abaixo).
# Obrigatórias: JOOMLA_FQDN, JOOMLA_DB_PASSWORD, MYSQL_ROOT_PASSWORD.
#
# NOTA (volumes em Swarm): os volumes são locais ao nó. Em cluster com mais de um worker,
# fixe os serviços com volume definindo WORKER_HOSTNAME e descomentando o constraint de hostname.
# Porte: Médio (512 MB → 2 GB RAM)
# Hardware (1 réplica): mínimo 1 vCPU · 1 GB RAM · 10 GB disco · ideal 2 vCPU · 2 GB RAM · 20 GB disco
services:
  joomla:
    image: joomla:${JOOMLA_IMAGE_TAG:-latest}
    networks:
      - default
      - web
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}
      labels:
        - traefik.enable=true
        - traefik.http.routers.joomla.rule=Host(`${JOOMLA_FQDN}`)
        - traefik.http.routers.joomla.entrypoints=websecure
        - traefik.http.routers.joomla.tls=true
        - traefik.http.routers.joomla.tls.certresolver=letsencryptresolver
        - traefik.http.services.joomla.loadbalancer.server.port=80
    environment:
      - JOOMLA_DB_HOST=db
      - JOOMLA_DB_USER=${JOOMLA_DB_USER:-joomla}
      - JOOMLA_DB_PASSWORD=${JOOMLA_DB_PASSWORD}
      - JOOMLA_DB_NAME=${JOOMLA_DB_NAME:-joomla}
    volumes:
      - joomla:/var/www/html

  db:
    image: mysql:${MYSQL_IMAGE_TAG:-8.0}
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${JOOMLA_DB_USER:-joomla}
      - MYSQL_PASSWORD=${JOOMLA_DB_PASSWORD}
      - MYSQL_DATABASE=${JOOMLA_DB_NAME:-joomla}
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - default
    deploy:
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: overlay

volumes:
  joomla:
    driver: local
  mysql:
    driver: local
