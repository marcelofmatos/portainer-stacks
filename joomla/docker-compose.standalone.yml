# Stack "joomla" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  joomla:
    restart: unless-stopped
    image: joomla:${JOOMLA_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    environment:
    - JOOMLA_DB_HOST=db
    - JOOMLA_DB_USER=${JOOMLA_DB_USER:-joomla}
    - JOOMLA_DB_PASSWORD=${JOOMLA_DB_PASSWORD}
    - JOOMLA_DB_NAME=${JOOMLA_DB_NAME:-joomla}
    volumes:
    - joomla:/var/www/html
    labels:
    - traefik.enable=true
    - traefik.http.routers.joomla.rule=Host(`${JOOMLA_FQDN}`)
    - traefik.http.routers.joomla.entrypoints=websecure
    - traefik.http.routers.joomla.tls=true
    - traefik.http.routers.joomla.tls.certresolver=letsencryptresolver
    - traefik.http.services.joomla.loadbalancer.server.port=80
    - caddy=${JOOMLA_FQDN}
    - caddy.reverse_proxy={{upstreams 80}}
    - traefik.docker.network=${PROXY_NET:-web}
  db:
    restart: unless-stopped
    image: mysql:${MYSQL_IMAGE_TAG:-8.0}
    environment:
    - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    - MYSQL_USER=${JOOMLA_DB_USER:-joomla}
    - MYSQL_PASSWORD=${JOOMLA_DB_PASSWORD}
    - MYSQL_DATABASE=${JOOMLA_DB_NAME:-joomla}
    volumes:
    - mysql:/var/lib/mysql
    networks:
    - default
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  joomla:
    driver: local
  mysql:
    driver: local
