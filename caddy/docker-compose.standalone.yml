# Stack "caddy" — caddy-docker-proxy (reverse proxy + HTTPS automático por labels) (variante Docker Compose)
# Alternativa ao `balancer`: configura-se por LABELS dos containers (auto-descoberta, estilo Traefik),
# sem Caddyfile central. O Caddy obtém/renova os certificados TLS sozinho.
# Pré-req: rede externa `web` (docker network create web) — é por ela que o Caddy alcança os alvos.
# NÃO rode Caddy e Traefik no mesmo host (disputam 80/443).
# Porte: Leve (64 MB → 512 MB RAM)
services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:${CADDY_IMAGE_TAG:-2.9-alpine}
    restart: unless-stopped
    environment:
      - CADDY_INGRESS_NETWORKS=${PROXY_NET:-web} # rede onde o Caddy alcança os containers a proxiar
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # lê os labels dos containers (ver Segurança no README)
      - caddy-data:/data # certificados TLS + estado do ACME — NÃO apague
      - caddy-config:/config # config autogerenciada do Caddy
    networks:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC)
    labels:
      # E-mail do ACME (opcional, recomendado p/ avisos de expiração): descomente e preencha.
      # - caddy.email=seu-email@exemplo.com
      - caddy.acme_ca=${CADDY_ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}

volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local
