# Stack "caddy" — caddy-docker-proxy (reverse proxy + HTTPS automático por labels) — Docker Swarm
# Alternativa ao `balancer` (Traefik): configura-se por LABELS dos serviços (auto-descoberta), sem
# Caddyfile central. Cada serviço declara suas rotas em `deploy.labels` (ex.: caddy + caddy.reverse_proxy).
# O Caddy obtém/renova os certificados TLS sozinho (Let's Encrypt/ZeroSSL).
#
# RODA NO MANAGER: precisa do docker.sock do manager para ler os serviços Swarm.
# NÃO use Caddy e Traefik (balancer) ao mesmo tempo no mesmo host (disputam as portas 80/443).
#
# NOTA (volumes em Swarm): os certificados ficam no volume `caddy-data` (local ao nó). Em cluster
# multi-manager, fixe o serviço definindo WORKER_HOSTNAME e descomentando o constraint de hostname.
# Porte: Leve (64 MB → 512 MB RAM)
# Hardware (1 réplica): mínimo 0.5 vCPU · 128 MB RAM · 2 GB disco · ideal 1 vCPU · 256 MB RAM · 5 GB disco
services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:${CADDY_IMAGE_TAG:-2.9-alpine}
    environment:
      - CADDY_INGRESS_NETWORKS=${PROXY_NET:-web} # rede onde o Caddy alcança os serviços a proxiar
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # lê os labels dos serviços (ver Segurança no README)
      - caddy-data:/data # certificados TLS + estado do ACME — NÃO apague
      - caddy-config:/config # config autogerenciada do Caddy
    networks:
      - web
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host # HTTP/3 (QUIC)
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager # precisa ler os serviços Swarm pelo docker.sock do manager
          # descomente em cluster multi-manager p/ fixar os certificados no nó:
          # - node.hostname == ${WORKER_HOSTNAME:-}
      labels:
        # E-mail do ACME (opcional, recomendado p/ avisos de expiração): descomente e preencha.
        # - caddy.email=seu-email@exemplo.com
        - caddy.acme_ca=${CADDY_ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}

volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local
