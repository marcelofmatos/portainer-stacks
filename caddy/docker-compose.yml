# Stack "caddy" — Caddy 2 (reverse proxy + HTTPS automático) — Docker Swarm
# Alternativa ao `balancer` (Traefik): Caddy é o ponto de entrada (:80/:443) e obtém/renova os
# certificados TLS sozinho (Let's Encrypt/ZeroSSL). A configuração é um Caddyfile.
#
# PRÉ-REQUISITO: o serviço usa 1 Docker config EXTERNO (nome configurável em CADDY_CONFIG_NAME):
#   <CADDY_CONFIG_NAME> -> /etc/caddy/Caddyfile  (ver config/Caddyfile)
# Crie-o antes do deploy (instruções no README). Config é imutável: para mudar, crie _v2.
#
# Entra na rede `web` para alcançar os containers a proxiar pelo nome (ex.: reverse_proxy app:8080).
# NÃO use Caddy e Traefik (balancer) ao mesmo tempo no mesmo host: ambos disputam as portas 80/443.
#
# NOTA (volumes em Swarm): os certificados ficam no volume `caddy-data` (local ao nó). Em cluster
# multi-worker, fixe o serviço definindo WORKER_HOSTNAME e descomentando o constraint de hostname,
# senão os certificados "pulam" de nó a cada reagendamento.
# Porte: Leve (64 MB → 512 MB RAM)
# Hardware (1 réplica): mínimo 0.5 vCPU · 128 MB RAM · 2 GB disco · ideal 1 vCPU · 256 MB RAM · 5 GB disco
services:
  caddy:
    image: caddy:${CADDY_IMAGE_TAG:-2-alpine}
    environment:
      - CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL:-} # e-mail do ACME (recomendado)
    configs:
      - source: caddy_caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy-data:/data # certificados TLS + estado do ACME — NÃO apague
      - caddy-config:/config # config autogerenciada do Caddy
    networks:
      - web
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host # HTTP/3 (QUIC)
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # descomente em cluster multi-worker p/ fixar os certificados no nó:
          # - node.hostname == ${WORKER_HOSTNAME:-}

configs:
  caddy_caddyfile:
    name: ${CADDY_CONFIG_NAME:-caddy_caddyfile_v1}
    external: true

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}

volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local
