# Stack "chatwoot" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  rails:
    restart: unless-stopped
    image: chatwoot/chatwoot:${CHATWOOT_IMAGE_TAG:-v4.6.0}
    entrypoint: docker/entrypoints/rails.sh
    command:
    - bundle
    - exec
    - rails
    - s
    - -p
    - '3000'
    - -b
    - 0.0.0.0
    networks:
    - default
    - web
    environment:
    - INSTALLATION_ENV=docker
    - RAILS_ENV=production
    - NODE_ENV=production
    - RAILS_LOG_TO_STDOUT=true
    - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY_BASE}
    - FRONTEND_URL=https://${CHATWOOT_FQDN}
    - POSTGRES_HOST=${CHATWOOT_DB_HOST:-db}
    - POSTGRES_PORT=${CHATWOOT_DB_PORT:-5432}
    - POSTGRES_USERNAME=${CHATWOOT_DB_USER:-postgres}
    - POSTGRES_PASSWORD=${CHATWOOT_DB_PASSWORD}
    - POSTGRES_DATABASE=${CHATWOOT_DB_NAME:-chatwoot}
    - REDIS_URL=${CHATWOOT_REDIS_URL:-redis://redis:6379}
    - ENABLE_ACCOUNT_SIGNUP=${CHATWOOT_ENABLE_SIGNUP:-false}
    volumes:
    - chatwoot-storage:/app/storage
    labels:
    - traefik.enable=true
    - traefik.http.routers.chatwoot.rule=Host(`${CHATWOOT_FQDN}`)
    - traefik.http.routers.chatwoot.entrypoints=websecure
    - traefik.http.routers.chatwoot.tls=true
    - traefik.http.routers.chatwoot.tls.certresolver=letsencryptresolver
    - traefik.http.services.chatwoot.loadbalancer.server.port=3000
    - caddy=${CHATWOOT_FQDN}
    - caddy.reverse_proxy={{upstreams 3000}}
    - traefik.docker.network=${PROXY_NET:-web}
  sidekiq:
    restart: unless-stopped
    image: chatwoot/chatwoot:${CHATWOOT_IMAGE_TAG:-v4.6.0}
    command:
    - bundle
    - exec
    - sidekiq
    - -C
    - config/sidekiq.yml
    networks:
    - default
    environment:
    - INSTALLATION_ENV=docker
    - RAILS_ENV=production
    - NODE_ENV=production
    - RAILS_LOG_TO_STDOUT=true
    - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY_BASE}
    - FRONTEND_URL=https://${CHATWOOT_FQDN}
    - POSTGRES_HOST=${CHATWOOT_DB_HOST:-db}
    - POSTGRES_PORT=${CHATWOOT_DB_PORT:-5432}
    - POSTGRES_USERNAME=${CHATWOOT_DB_USER:-postgres}
    - POSTGRES_PASSWORD=${CHATWOOT_DB_PASSWORD}
    - POSTGRES_DATABASE=${CHATWOOT_DB_NAME:-chatwoot}
    - REDIS_URL=${CHATWOOT_REDIS_URL:-redis://redis:6379}
    volumes:
    - chatwoot-storage:/app/storage
  db:
    restart: unless-stopped
    image: postgres:${CHATWOOT_DB_IMAGE_TAG:-16-alpine}
    networks:
    - default
    - data
    environment:
    - POSTGRES_DB=${CHATWOOT_DB_NAME:-chatwoot}
    - POSTGRES_USER=${CHATWOOT_DB_USER:-postgres}
    - POSTGRES_PASSWORD=${CHATWOOT_DB_PASSWORD}
    volumes:
    - db-data:/var/lib/postgresql/data
  redis:
    restart: unless-stopped
    image: redis:${CHATWOOT_REDIS_IMAGE_TAG:-7-alpine}
    command: redis-server --save 60 1
    networks:
    - default
    - data
    volumes:
    - redis-data:/data
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: bridge
volumes:
  chatwoot-storage:
    driver: local
  db-data:
    driver: local
  redis-data:
    driver: local
