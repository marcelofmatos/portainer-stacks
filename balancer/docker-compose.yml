# Stack "balancer" — Traefik v3 (reverse proxy + TLS Let's Encrypt) para Docker Swarm
# Roda no manager. Cria/usa a rede externa pública `web` por onde as demais stacks publicam.
# Variáveis: DOMAIN, ACME_EMAIL, HTTP_AUTH_BASIC (basicauth do dashboard, formato user:hash bcrypt).
# Porte: Leve (64 MB → 512 MB RAM)
# Hardware (1 réplica): mínimo 1 vCPU · 256 MB RAM · 5 GB disco · ideal 1 vCPU · 512 MB RAM · 10 GB disco
services:

  traefik:
    image: traefik:${TRAEFIK_IMAGE_TAG:-v3.7}
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    command:
      - "--api"
      - "--api.dashboard=true"
      - "--providers.swarm=true"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.network=${PROXY_NET:-web}"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.certresolver=letsencryptresolver"
      - "--certificatesresolvers.letsencryptresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencryptresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencryptresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencryptresolver.acme.storage=/etc/traefik/letsencrypt/acme.json"
      - "--serversTransport.insecureSkipVerify=true"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-WARN}"
      - "--accesslog=true"
      - "--accesslog.filepath=/logs/access.log"
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.services.balancer-traefik.loadbalancer.server.port=8080
        # O dashboard e servido pelo handler interno da API. Sem esta linha o router cai
        # no service do provider docker e tenta proxiar para a 8080 do proprio container,
        # que so existe com --api.insecure=true -> 502 Bad Gateway.
        - traefik.http.routers.balancer-traefik.service=api@internal
        - traefik.http.routers.balancer-traefik.entrypoints=websecure
        - traefik.http.routers.balancer-traefik.tls=true
        - traefik.http.routers.balancer-traefik.tls.certresolver=letsencryptresolver
        - traefik.http.routers.balancer-traefik.rule=Host(`traefik.balancer.${DOMAIN}`)
        - traefik.http.routers.balancer-traefik.middlewares=traefik-auth
        - traefik.http.middlewares.traefik-auth.basicauth.users=${HTTP_AUTH_BASIC}
        - traefik.http.middlewares.gzip.compress=true
        - traefik.http.middlewares.redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.redirect-https.redirectscheme.permanent=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certificates:/etc/traefik/letsencrypt
      - logs:/logs
    networks:
      - network_swarm_public
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host

volumes:
  certificates:
    driver: local
  logs:
    driver: local

networks:
  network_swarm_public:
    external: true
    name: ${PROXY_NET:-web}
