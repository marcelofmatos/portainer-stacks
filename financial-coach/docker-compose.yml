# Stack "financial-coach" — AI Financial Coach Agent — Docker Swarm
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
# Coach financeiro multi-agente (Next.js + agente Google ADK/FastAPI + Gemini). Imagem combinada:
# front em :3000 (exposto) e agente em :8000 (interno, detem a chave). Stateless — sem volume.
# App SEM login proprio: proteja com forward-auth (stack authelia) — label de middleware comentada.
#
# Obrigatorias: FINCOACH_FQDN, GOOGLE_API_KEY.
# Porte: Leve (sem banco; o custo real e a API Google/Gemini)
services:
  app:
    image: ghcr.io/marcelofmatos/ai-financial-coach-agent:${FINCOACH_IMAGE_TAG:-latest}
    networks:
      - default
      - web
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:?GOOGLE_API_KEY e obrigatorio}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - traefik.enable=true
        - traefik.http.routers.fincoach.rule=Host(`${FINCOACH_FQDN}`)
        - traefik.http.routers.fincoach.entrypoints=websecure
        - traefik.http.routers.fincoach.tls=true
        - traefik.http.routers.fincoach.tls.certresolver=letsencryptresolver
        - traefik.http.services.fincoach.loadbalancer.server.port=3000
        # App sem login proprio — proteja com forward-auth (stack authelia):
        # - traefik.http.routers.fincoach.middlewares=${FINCOACH_AUTH_MIDDLEWARE:-}
        - caddy=${FINCOACH_FQDN}
        - caddy.reverse_proxy={{upstreams 3000}}

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: overlay
