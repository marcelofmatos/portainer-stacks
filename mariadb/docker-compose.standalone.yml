# Stack "mariadb" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  mariadb:
    restart: unless-stopped
    image: mariadb:${MARIADB_IMAGE_TAG:-11}
    hostname: mariadb
    networks:
    - data
    environment:
    - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
    - MARIADB_DATABASE=${MARIADB_DATABASE:-appdb}
    - MARIADB_USER=${MARIADB_USER:-app}
    - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    - MARIADB_AUTO_UPGRADE=1
    volumes:
    - mariadb-data:/var/lib/mysql
networks:
  data:
    external: true
    name: ${DATA_NET:-data}
volumes:
  mariadb-data:
    driver: local
