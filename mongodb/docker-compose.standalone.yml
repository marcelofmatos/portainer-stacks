# Stack "mongodb" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  mongodb:
    restart: unless-stopped
    image: mongo:${MONGO_IMAGE_TAG:-7}
    hostname: mongodb
    networks:
    - data
    environment:
    - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-root}
    - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    - MONGO_INITDB_DATABASE=${MONGO_DATABASE:-appdb}
    volumes:
    - mongodb-data:/data/db
networks:
  data:
    external: true
    name: ${DATA_NET:-data}
volumes:
  mongodb-data:
    driver: local
