# Stack "mongodb" — MongoDB (Docker Swarm) — banco NoSQL INTERNO
# NÃO usa Traefik nem a rede `web`. Fica na rede overlay externa compartilhada `data`;
# outras stacks anexam essa rede e conectam pelo nome do serviço (host `mongodb`, porta 27017).
# Admin via web: use a stack `mongo-express`.
#
# Crie a rede antes de subir a stack:
#   docker network create --driver overlay --attachable data
#
# Obrigatórias (segredo): MONGO_ROOT_PASSWORD.
#
# NOTA (volumes em Swarm): os volumes são locais ao nó. Em cluster multi-worker, fixe este serviço
# definindo WORKER_HOSTNAME e descomentando o constraint de hostname.
services:
  mongodb:
    image: mongo:${MONGO_IMAGE_TAG:-7}
    hostname: mongodb
    networks:
      - data
    # Acesso externo opcional (modo host publica 27017 no nó). Descomente se precisar
    # conectar de fora do cluster. Veja a nota no README sobre segurança.
    # ports:
    #   - target: 27017
    #     published: ${MONGO_PORT:-27017}
    #     mode: host
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE:-appdb}
    volumes:
      - mongodb-data:/data/db
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}

networks:
  data:
    external: true
    name: ${DATA_NET:-data}

volumes:
  mongodb-data:
    driver: local
