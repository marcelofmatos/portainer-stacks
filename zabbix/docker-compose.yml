# Stack "zabbix" — Zabbix (monitoramento) + PostgreSQL embarcado — Docker Swarm
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
# Banco PRÓPRIO desta stack (serviço `db`): NÃO usa o postgres-pgvector compartilhado.
#
# Componentes: zabbix-server (coletor, porta 10051), zabbix-web (UI), zabbix-agent2 (auto-monitoração),
# db (PostgreSQL embarcado).
# O zabbix-server importa o schema automaticamente num banco vazio na primeira subida.
#
# Obrigatórias: ZABBIX_FQDN, ZABBIX_DB_PASSWORD.
# Porte: Médio (512 MB → 2 GB RAM)
# Hardware (1 réplica): mínimo 1 vCPU · 1 GB RAM · 10 GB disco · ideal 2 vCPU · 2 GB RAM · 20 GB disco
services:
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:${ZABBIX_IMAGE_TAG:-alpine-7.0-latest}
    networks:
      - default # conversa com o banco `db` internamente
    # Agents externos conectam no trapper 10051. Descomente para publicar no nó.
    # ports:
    #   - target: 10051
    #     published: ${ZABBIX_SERVER_PORT:-10051}
    #     mode: host
    environment:
      - DB_SERVER_HOST=${ZABBIX_DB_HOST:-db} # nome do serviço de banco nesta stack
      - DB_SERVER_PORT=${ZABBIX_DB_PORT:-5432}
      - POSTGRES_USER=${ZABBIX_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD}
      - POSTGRES_DB=${ZABBIX_DB_NAME:-zabbix}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:${ZABBIX_IMAGE_TAG:-alpine-7.0-latest}
    networks:
      - default # conversa com o banco `db` e o server internamente
      - web # exposto pelo Traefik
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_SERVER_PORT=10051
      - DB_SERVER_HOST=${ZABBIX_DB_HOST:-db} # nome do serviço de banco nesta stack
      - DB_SERVER_PORT=${ZABBIX_DB_PORT:-5432}
      - POSTGRES_USER=${ZABBIX_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD}
      - POSTGRES_DB=${ZABBIX_DB_NAME:-zabbix}
      - PHP_TZ=${ZABBIX_TIMEZONE:-America/Sao_Paulo}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - traefik.enable=true
        - traefik.http.routers.zabbix.rule=Host(`${ZABBIX_FQDN}`)
        - traefik.http.routers.zabbix.entrypoints=websecure
        - traefik.http.routers.zabbix.tls=true
        - traefik.http.routers.zabbix.tls.certresolver=letsencryptresolver
        - traefik.http.services.zabbix.loadbalancer.server.port=8080
        - caddy=${ZABBIX_FQDN}
        - caddy.reverse_proxy={{upstreams 8080}}

  zabbix-agent:
    image: zabbix/zabbix-agent2:${ZABBIX_IMAGE_TAG:-alpine-7.0-latest}
    networks:
      - default
    environment:
      - ZBX_HOSTNAME=Zabbix server
      - ZBX_SERVER_HOST=zabbix-server
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker

  # Banco de dados PRÓPRIO da stack (não compartilhe com outras stacks).
  db:
    image: postgres:${ZABBIX_DB_IMAGE_TAG:-16-alpine}
    networks:
      - default # acesso do server e do web
      - data # SÓ para ferramentas de admin (pgadmin4) via host `zabbix_db`
    environment:
      - POSTGRES_DB=${ZABBIX_DB_NAME:-zabbix}
      - POSTGRES_USER=${ZABBIX_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD} # OBRIGATÓRIA
    volumes:
      - db-data:/var/lib/postgresql/data # ← copie este volume para migrar de host
    deploy:
      placement:
        constraints:
          - node.role == worker
          # fixe o db no nó em cluster multi-worker:
          # - node.hostname == ${WORKER_HOSTNAME:-}

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: overlay

volumes:
  db-data:
    driver: local
