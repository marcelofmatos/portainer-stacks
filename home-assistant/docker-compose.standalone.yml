# Stack "home-assistant" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  homeassistant:
    restart: unless-stopped
    image: ghcr.io/home-assistant/home-assistant:${HOMEASSISTANT_IMAGE_TAG:-stable}
    networks:
    - web
    environment:
    - TZ=${TZ:-America/Sao_Paulo}
    volumes:
    - homeassistant-config:/config
    labels:
    - traefik.enable=true
    - traefik.http.routers.homeassistant.rule=Host(`${HOMEASSISTANT_FQDN}`)
    - traefik.http.routers.homeassistant.entrypoints=websecure
    - traefik.http.routers.homeassistant.tls=true
    - traefik.http.routers.homeassistant.tls.certresolver=letsencryptresolver
    - traefik.http.services.homeassistant.loadbalancer.server.port=8123
    - caddy=${HOMEASSISTANT_FQDN}
    - caddy.reverse_proxy={{upstreams 8123}}
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
volumes:
  homeassistant-config:
    driver: local
