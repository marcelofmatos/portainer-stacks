# Stack "twenty" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  server:
    restart: unless-stopped
    image: twentycrm/twenty:${TWENTY_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    environment:
    - NODE_PORT=3000
    - SERVER_URL=https://${TWENTY_FQDN}
    - PG_DATABASE_URL=postgres://${TWENTY_DB_USER:-postgres}:${TWENTY_DB_PASSWORD}@${TWENTY_DB_HOST:-db}:${TWENTY_DB_PORT:-5432}/${TWENTY_DB_NAME:-twenty}
    - REDIS_URL=${TWENTY_REDIS_URL:-redis://redis:6379}
    - APP_SECRET=${TWENTY_APP_SECRET}
    - STORAGE_TYPE=local
    volumes:
    - twenty-data:/app/packages/twenty-server/.local-storage
    labels:
    - traefik.enable=true
    - traefik.http.routers.twenty.rule=Host(`${TWENTY_FQDN}`)
    - traefik.http.routers.twenty.entrypoints=websecure
    - traefik.http.routers.twenty.tls=true
    - traefik.http.routers.twenty.tls.certresolver=letsencryptresolver
    - traefik.http.services.twenty.loadbalancer.server.port=3000
    - traefik.docker.network=${PROXY_NET:-web}
  worker:
    restart: unless-stopped
    image: twentycrm/twenty:${TWENTY_IMAGE_TAG:-latest}
    command:
    - yarn
    - worker:prod
    networks:
    - default
    environment:
    - SERVER_URL=https://${TWENTY_FQDN}
    - PG_DATABASE_URL=postgres://${TWENTY_DB_USER:-postgres}:${TWENTY_DB_PASSWORD}@${TWENTY_DB_HOST:-db}:${TWENTY_DB_PORT:-5432}/${TWENTY_DB_NAME:-twenty}
    - REDIS_URL=${TWENTY_REDIS_URL:-redis://redis:6379}
    - APP_SECRET=${TWENTY_APP_SECRET}
    - STORAGE_TYPE=local
    - DISABLE_DB_MIGRATIONS=true
    - DISABLE_CRON_JOBS_REGISTRATION=true
    volumes:
    - twenty-data:/app/packages/twenty-server/.local-storage
  db:
    restart: unless-stopped
    image: postgres:${TWENTY_DB_IMAGE_TAG:-16-alpine}
    networks:
    - default
    - data
    environment:
    - POSTGRES_DB=${TWENTY_DB_NAME:-twenty}
    - POSTGRES_USER=${TWENTY_DB_USER:-postgres}
    - POSTGRES_PASSWORD=${TWENTY_DB_PASSWORD}
    volumes:
    - db-data:/var/lib/postgresql/data
  redis:
    restart: unless-stopped
    image: redis:${TWENTY_REDIS_IMAGE_TAG:-7-alpine}
    command: redis-server --save 60 1
    networks:
    - default
    - data
    volumes:
    - redis-data:/data
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: bridge
volumes:
  twenty-data:
    driver: local
  db-data:
    driver: local
  redis-data:
    driver: local
