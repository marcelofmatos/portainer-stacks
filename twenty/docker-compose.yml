# ┌───────────────────────────────────────────────────────────────────────────┐
# │ Stack "twenty" — Twenty (CRM) + PostgreSQL + Redis embarcados (Docker Swarm) │
# └───────────────────────────────────────────────────────────────────────────┘
# PRIMEIRA VEZ? Leia isto:
#   1. Crie as redes externas (uma vez por cluster):
#        docker network create --driver overlay --attachable web
#        docker network create --driver overlay --attachable data
#   2. Tenha a stack `balancer` (Traefik) rodando e o DNS de TWENTY_FQDN apontando p/ o host.
#   3. Defina as variáveis OBRIGATÓRIAS no deploy: TWENTY_FQDN, TWENTY_APP_SECRET, TWENTY_DB_PASSWORD.
#   4. Deploy → acesse https://TWENTY_FQDN (primeira tela = criação da conta/workspace).
#
# COMO FUNCIONA:
#   - `server` (app) é publicado pelo Traefik na rede `web`; fala com `db` e `redis` pela `default`.
#   - `worker` processa filas/jobs assíncronos (BullMQ no Redis), com a mesma config do server.
#   - `db` (PostgreSQL) e `redis` são PRÓPRIOS desta stack: NÃO use as stacks `postgres-pgvector`/`redis`.
#       * ficam na `default` (o app os acessa pelos nomes `db` e `redis`)
#       * ficam TAMBÉM na `data` SÓ para ferramentas de admin (pgadmin4/redisinsight) os alcançarem
#         como `twenty_db` e `twenty_redis`
#   - Volumes dedicados (`db-data`, `redis-data`, `twenty-data`): para migrar de host, basta copiá-los.
#
# VOLUME EM SWARM: volumes são locais ao nó. Em cluster com +1 worker, fixe os serviços no MESMO nó
# definindo WORKER_HOSTNAME e descomentando os constraints `node.hostname` abaixo.
services:
  server:
    image: twentycrm/twenty:${TWENTY_IMAGE_TAG:-latest}
    networks:
      - default # conversa com `db` e `redis` internamente
      - web # exposto pelo Traefik
    environment:
      - NODE_PORT=3000
      - SERVER_URL=https://${TWENTY_FQDN}
      - PG_DATABASE_URL=postgres://${TWENTY_DB_USER:-postgres}:${TWENTY_DB_PASSWORD}@${TWENTY_DB_HOST:-db}:${TWENTY_DB_PORT:-5432}/${TWENTY_DB_NAME:-twenty}
      - REDIS_URL=${TWENTY_REDIS_URL:-redis://redis:6379}
      - APP_SECRET=${TWENTY_APP_SECRET}
      - STORAGE_TYPE=local
    volumes:
      - twenty-data:/app/packages/twenty-server/.local-storage
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}   # fixe em cluster multi-worker (volume local ao nó)
      labels:
        - traefik.enable=true
        - traefik.http.routers.twenty.rule=Host(`${TWENTY_FQDN}`)
        - traefik.http.routers.twenty.entrypoints=websecure
        - traefik.http.routers.twenty.tls=true
        - traefik.http.routers.twenty.tls.certresolver=letsencryptresolver
        - traefik.http.services.twenty.loadbalancer.server.port=3000

  worker:
    image: twentycrm/twenty:${TWENTY_IMAGE_TAG:-latest}
    command: ["yarn", "worker:prod"]
    networks:
      - default # conversa com `db` e `redis` internamente
    environment:
      - SERVER_URL=https://${TWENTY_FQDN}
      - PG_DATABASE_URL=postgres://${TWENTY_DB_USER:-postgres}:${TWENTY_DB_PASSWORD}@${TWENTY_DB_HOST:-db}:${TWENTY_DB_PORT:-5432}/${TWENTY_DB_NAME:-twenty}
      - REDIS_URL=${TWENTY_REDIS_URL:-redis://redis:6379}
      - APP_SECRET=${TWENTY_APP_SECRET}
      - STORAGE_TYPE=local
    volumes:
      - twenty-data:/app/packages/twenty-server/.local-storage
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}   # fixe no MESMO nó do server

  # Banco de dados PRÓPRIO da stack (não compartilhe com outras stacks).
  db:
    image: postgres:${TWENTY_DB_IMAGE_TAG:-16-alpine}
    networks:
      - default # acesso do app
      - data # SÓ para ferramentas de admin (pgadmin4) via host `twenty_db`
    environment:
      - POSTGRES_DB=${TWENTY_DB_NAME:-twenty}
      - POSTGRES_USER=${TWENTY_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${TWENTY_DB_PASSWORD} # OBRIGATÓRIA
    volumes:
      - db-data:/var/lib/postgresql/data # ← copie este volume para migrar de host
    deploy:
      placement:
        constraints:
          - node.role == worker
          # fixe o db no MESMO nó do server em cluster multi-worker:
          # - node.hostname == ${WORKER_HOSTNAME:-}

  # Cache/filas PRÓPRIO da stack (não compartilhe com outras stacks).
  redis:
    image: redis:${TWENTY_REDIS_IMAGE_TAG:-7-alpine}
    command: redis-server --save 60 1 # persistência leve em disco
    networks:
      - default # acesso do app
      - data # SÓ para ferramentas de admin (redisinsight) via host `twenty_redis`
    volumes:
      - redis-data:/data # ← copie este volume para migrar de host
    deploy:
      placement:
        constraints:
          - node.role == worker
          # fixe o redis no MESMO nó do server em cluster multi-worker:
          # - node.hostname == ${WORKER_HOSTNAME:-}

networks:
  web: # externa: criada pela stack balancer (Traefik)
    external: true
    name: ${PROXY_NET:-web}
  data: # externa: liga banco/cache às ferramentas de admin (pgadmin4/redisinsight etc.)
    external: true
    name: ${DATA_NET:-data}
  default: # interna desta stack: app <-> db/redis
    driver: overlay

volumes:
  twenty-data:
    driver: local
  db-data:
    driver: local
  redis-data:
    driver: local
