# Stack "zabbix-status-page" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie a rede externa do proxy (docker network create web).
# Consome um Zabbix EXTERNO (>= 6.4) via API JSON-RPC com token (não sobe um Zabbix aqui).
services:
  app:
    restart: unless-stopped
    image: ghcr.io/marcelofmatos/zabbix-status-page:${APP_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    environment:
    - ZABBIX_URL=${ZABBIX_URL}
    - ZABBIX_TOKEN=${ZABBIX_TOKEN}
    - ZABBIX_GROUPS_IDS=${ZABBIX_GROUPS_IDS:-}
    - ZABBIX_HOSTS_IDS=${ZABBIX_HOSTS_IDS:-}
    - ZABBIX_STATUS_BY_GROUPS=${ZABBIX_STATUS_BY_GROUPS:-on}
    - ZABBIX_KNOWLEDGES=${ZABBIX_KNOWLEDGES:-on}
    - ZABBIX_KNOWLEDGES_COMMENTS=${ZABBIX_KNOWLEDGES_COMMENTS:-on}
    - ZABBIX_MIN_SEVERITY=${ZABBIX_MIN_SEVERITY:-0}
    - ZABBIX_TLS_INSECURE=${ZABBIX_TLS_INSECURE:-off}
    - PAGE_TITLE=${PAGE_TITLE:-Status}
    - TZ=${TZ:-UTC}
    - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-60}
    - HISTORY_DAYS=${HISTORY_DAYS:-90}
    volumes:
    - status-data:/data
    labels:
    - traefik.enable=true
    - traefik.http.routers.statuspage.rule=Host(`${STATUS_FQDN}`)
    - traefik.http.routers.statuspage.entrypoints=websecure
    - traefik.http.routers.statuspage.tls=true
    - traefik.http.routers.statuspage.tls.certresolver=letsencryptresolver
    - traefik.http.services.statuspage.loadbalancer.server.port=8080
    - traefik.docker.network=${PROXY_NET:-web}

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge

volumes:
  status-data:
    driver: local
