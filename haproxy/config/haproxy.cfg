# Template de configuração do HAProxy (sem segredos) — stack "haproxy".
# Crie-o como Docker config (ver README):
#   docker config create haproxy_config_v1 haproxy/config/haproxy.cfg
# Config é imutável: para alterar, crie haproxy_config_v2 e ajuste HAPROXY_CONFIG_NAME.

global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s

# Página de stats (exposta via Traefik na porta 8404, protegida por basicauth do Traefik).
frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 10s

