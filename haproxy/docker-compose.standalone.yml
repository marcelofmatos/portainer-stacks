# Stack "haproxy" — HAProxy (load balancer TCP/HTTP) (variante Docker Compose)
# A config é montada de um arquivo local (bind mount): aponte HAPROXY_CONFIG_FILE para o seu
# haproxy.cfg (default ./config/haproxy.cfg). A página de stats (8404) é publicada via Traefik.
# Pré-req: redes externas `web` e `data`.
# Obrigatórias: HAPROXY_FQDN, HAPROXY_AUTH_BASIC.
# Porte: Leve (64 MB → 512 MB RAM)
services:
  haproxy:
    image: haproxy:${HAPROXY_IMAGE_TAG:-lts-alpine}
    restart: unless-stopped
    networks:
      - default
      - web
      - data
    volumes:
      # haproxy.cfg via arquivo local do host:
      - ${HAPROXY_CONFIG_FILE:-./config/haproxy.cfg}:/usr/local/etc/haproxy/haproxy.cfg:ro
    # Frontends TCP definidos no haproxy.cfg precisam ser publicados aqui. Ex.:
    # ports:
    #   - "3306:3306"
    labels:
      - traefik.enable=true
      - traefik.http.routers.haproxy.rule=Host(`${HAPROXY_FQDN}`)
      - traefik.http.routers.haproxy.entrypoints=websecure
      - traefik.http.routers.haproxy.tls=true
      - traefik.http.routers.haproxy.tls.certresolver=letsencryptresolver
      - traefik.http.routers.haproxy.middlewares=haproxy-auth
      - traefik.http.middlewares.haproxy-auth.basicauth.users=${HAPROXY_AUTH_BASIC}
      - traefik.http.services.haproxy.loadbalancer.server.port=8404
      - traefik.docker.network=${PROXY_NET:-web}

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: bridge
