# Stack "qdrant" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  qdrant:
    restart: unless-stopped
    image: qdrant/qdrant:${QDRANT_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    - data
    environment:
    - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:?QDRANT_API_KEY e obrigatoria}
    volumes:
    - qdrant-data:/qdrant/storage
    labels:
    - traefik.enable=true
    - traefik.http.routers.qdrant.rule=Host(`${QDRANT_FQDN}`)
    - traefik.http.routers.qdrant.entrypoints=websecure
    - traefik.http.routers.qdrant.tls=true
    - traefik.http.routers.qdrant.tls.certresolver=letsencryptresolver
    - traefik.http.services.qdrant.loadbalancer.server.port=6333
    - caddy=${QDRANT_FQDN}
    - caddy.reverse_proxy={{upstreams 6333}}
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: bridge
volumes:
  qdrant-data:
    driver: local
