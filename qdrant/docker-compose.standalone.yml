# Stack "qdrant" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  qdrant:
    restart: unless-stopped
    image: qdrant/qdrant:${QDRANT_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    - data
    environment:
    - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:?QDRANT_API_KEY e obrigatoria}
    volumes:
    - qdrant-data:/qdrant/storage
    labels:
    - traefik.enable=true
    - traefik.http.routers.qdrant.rule=Host(`${QDRANT_FQDN}`)
    - traefik.http.routers.qdrant.entrypoints=websecure
    - traefik.http.routers.qdrant.tls=true
    - traefik.http.routers.qdrant.tls.certresolver=letsencryptresolver
    - traefik.http.services.qdrant.loadbalancer.server.port=6333
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: bridge
volumes:
  qdrant-data:
    driver: local
