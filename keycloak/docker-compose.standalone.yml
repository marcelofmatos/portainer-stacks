# Stack "keycloak" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  keycloak:
    restart: unless-stopped
    image: quay.io/keycloak/keycloak:${KEYCLOAK_IMAGE_TAG:-latest}
    command: start
    networks:
    - default
    - web
    environment:
    - KC_DB=postgres
    - KC_DB_URL_HOST=db
    - KC_DB_USERNAME=${KEYCLOAK_DB_USER:-keycloak}
    - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    - KC_HOSTNAME=${KEYCLOAK_FQDN}
    - KC_PROXY_HEADERS=xforwarded
    - KC_HTTP_ENABLED=true
    - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
    - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    labels:
    - traefik.enable=true
    - traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_FQDN}`)
    - traefik.http.routers.keycloak.entrypoints=websecure
    - traefik.http.routers.keycloak.tls=true
    - traefik.http.routers.keycloak.tls.certresolver=letsencryptresolver
    - traefik.http.services.keycloak.loadbalancer.server.port=8080
    - traefik.docker.network=${PROXY_NET:-web}
  db:
    restart: unless-stopped
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    environment:
    - POSTGRES_DB=${KEYCLOAK_DB_NAME:-keycloak}
    - POSTGRES_USER=${KEYCLOAK_DB_USER:-keycloak}
    - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    volumes:
    - pgdata:/var/lib/postgresql/data
    networks:
    - default
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  pgdata:
    driver: local
