# Stack "redis" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  redis:
    restart: unless-stopped
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    command:
    - redis-server
    - --maxmemory
    - ${REDIS_MAXMEMORY:-256mb}
    - --maxmemory-policy
    - ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    - --appendonly
    - ${REDIS_APPENDONLY:-yes}
    - --requirepass
    - ${REDIS_PASSWORD:-}
    volumes:
    - redis-data:/data
    networks:
    - data
networks:
  data:
    external: true
    name: ${DATA_NET:-data}
volumes:
  redis-data:
    driver: local
