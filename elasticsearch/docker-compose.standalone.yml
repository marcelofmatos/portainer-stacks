# Stack "elasticsearch" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  elasticsearch:
    restart: unless-stopped
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_IMAGE_TAG:-8.15.3}
    hostname: elasticsearch
    networks:
    - data
    environment:
    - discovery.type=single-node
    - cluster.name=${ELASTIC_CLUSTER_NAME:-portainer-stacks}
    - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    - xpack.security.enabled=${ELASTIC_SECURITY:-true}
    - bootstrap.memory_lock=true
    - ES_JAVA_OPTS=${ELASTIC_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
    - elasticsearch-data:/usr/share/elasticsearch/data
networks:
  data:
    external: true
    name: ${DATA_NET:-data}
volumes:
  elasticsearch-data:
    driver: local
