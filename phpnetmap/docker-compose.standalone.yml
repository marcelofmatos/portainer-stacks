# Stack "phpnetmap" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  phpnetmap:
    restart: unless-stopped
    image: ghcr.io/marcelofmatos/phpnetmap:${PHPNETMAP_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    environment:
    - ADMIN_USER=${PHPNETMAP_ADMIN_USER:-admin}
    - ADMIN_PASSWORD=${PHPNETMAP_ADMIN_PASSWORD}
    volumes:
    - phpnetmap-data:/app/protected/data
    labels:
    - traefik.enable=true
    - traefik.http.routers.phpnetmap.rule=Host(`${PHPNETMAP_FQDN}`)
    - traefik.http.routers.phpnetmap.entrypoints=websecure
    - traefik.http.routers.phpnetmap.tls=true
    - traefik.http.routers.phpnetmap.tls.certresolver=letsencryptresolver
    - traefik.http.services.phpnetmap.loadbalancer.server.port=80
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  phpnetmap-data:
    driver: local
