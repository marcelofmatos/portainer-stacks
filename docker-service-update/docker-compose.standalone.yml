# Stack "docker-service-update" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  api:
    restart: unless-stopped
    image: ghcr.io/marcelofmatos/docker-service-update:${APP_IMAGE_TAG:-latest}
    networks:
    - web
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    labels:
    - traefik.enable=true
    - traefik.http.routers.docker-service-update.rule=Host(`${UPDATE_FQDN}`)
    - traefik.http.routers.docker-service-update.entrypoints=websecure
    - traefik.http.routers.docker-service-update.tls=true
    - traefik.http.routers.docker-service-update.tls.certresolver=letsencryptresolver
    - traefik.http.routers.docker-service-update.middlewares=docker-service-update-auth
    - traefik.http.middlewares.docker-service-update-auth.basicauth.users=${UPDATE_AUTH_BASIC}
    - traefik.http.services.docker-service-update.loadbalancer.server.port=80
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
