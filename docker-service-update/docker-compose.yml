# Stack "docker-service-update" — Docker Manager API (webhook de deploy para Docker Swarm)
# API HTTP (Flask) que recebe o nome de uma imagem e força o re-deploy de todos os serviços
# Swarm que a utilizam (`docker service update --force`). Projeto OSS: marcelofmatos/docker-service-update.
# Roda no MANAGER (precisa do socket do Docker para gerenciar serviços) e é publicada via Traefik v3 + TLS.
# Protegida por basicauth: o endpoint força re-deploy de qualquer serviço — nao deixe sem auth na internet.
services:
  api:
    image: ghcr.io/marcelofmatos/docker-service-update:${APP_IMAGE_TAG:-latest}
    networks:
      - web
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.docker-service-update.rule=Host(`${UPDATE_FQDN}`)
        - traefik.http.routers.docker-service-update.entrypoints=websecure
        - traefik.http.routers.docker-service-update.tls=true
        - traefik.http.routers.docker-service-update.tls.certresolver=letsencryptresolver
        - traefik.http.routers.docker-service-update.middlewares=docker-service-update-auth
        - traefik.http.middlewares.docker-service-update-auth.basicauth.users=${UPDATE_AUTH_BASIC}
        - traefik.http.services.docker-service-update.loadbalancer.server.port=80

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
