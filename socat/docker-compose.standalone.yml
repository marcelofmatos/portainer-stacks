# Stack "socat" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  socat:
    restart: unless-stopped
    image: alpine/socat:${SOCAT_IMAGE_TAG:-latest}
    command: TCP-LISTEN:${SOCAT_LISTEN_PORT},fork,reuseaddr TCP:${SOCAT_TARGET}
    networks:
    - default
    - data
    - web
    ports:
    - target: ${SOCAT_LISTEN_PORT}
      published: ${SOCAT_LISTEN_PORT}
      mode: host
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: bridge
