# Stack "protonmail-bridge" — variante Docker Compose (host standalone). Variáveis, portas e uso no README.
# Pré-requisito: crie as redes externas usadas pela stack (ex.: docker network create web; e data/ldap se aplicável).
services:
  smtp:
    restart: unless-stopped
    image: pattertj/protonmail-bridge:${PROTONMAIL_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    environment:
    - WEBUI_AUTH_TOKEN=${PROTONMAIL_WEBUI_AUTH_TOKEN}
    volumes:
    - protonmail-bridge-data:/root
    labels:
    - traefik.enable=true
    - traefik.http.routers.protonmail-bridge.rule=Host(`${PROTONMAIL_FQDN}`)
    - traefik.http.routers.protonmail-bridge.entrypoints=websecure
    - traefik.http.routers.protonmail-bridge.tls=true
    - traefik.http.routers.protonmail-bridge.tls.certresolver=letsencryptresolver
    - traefik.http.services.protonmail-bridge.loadbalancer.server.port=3000
    - caddy=${PROTONMAIL_FQDN}
    - caddy.reverse_proxy={{upstreams 3000}}
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  protonmail-bridge-data:
    driver: local
