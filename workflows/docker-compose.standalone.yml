# Stack "workflows" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  n8n:
    restart: unless-stopped
    image: n8nio/n8n:${N8N_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    environment:
    - N8N_HOST=${N8N_FQDN}
    - N8N_PROTOCOL=https
    - N8N_PORT=5678
    - WEBHOOK_URL=https://${N8N_FQDN}/
    - N8N_EDITOR_BASE_URL=https://${N8N_FQDN}/
    - GENERIC_TIMEZONE=${TZ:-America/Sao_Paulo}
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=db
    - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n}
    - DB_POSTGRESDB_USER=${N8N_DB_USER:-n8n}
    - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
    volumes:
    - n8n_data:/home/node/.n8n
    labels:
    - traefik.enable=true
    - traefik.http.routers.workflows.rule=Host(`${N8N_FQDN}`)
    - traefik.http.routers.workflows.entrypoints=websecure
    - traefik.http.routers.workflows.tls=true
    - traefik.http.routers.workflows.tls.certresolver=letsencryptresolver
    - traefik.http.services.workflows.loadbalancer.server.port=5678
    - traefik.docker.network=${PROXY_NET:-web}
  db:
    restart: unless-stopped
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    environment:
    - POSTGRES_DB=${N8N_DB_NAME:-n8n}
    - POSTGRES_USER=${N8N_DB_USER:-n8n}
    - POSTGRES_PASSWORD=${N8N_DB_PASSWORD}
    volumes:
    - db_data:/var/lib/postgresql/data
    networks:
    - default
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: bridge
volumes:
  n8n_data:
    driver: local
  db_data:
    driver: local
