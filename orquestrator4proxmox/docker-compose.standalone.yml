# Stack "orquestrator4proxmox" — painel web de VMs Proxmox para operadores N1 (variante Docker Compose, host standalone).
# Proxy: Traefik v3 na rede externa `web` (TLS Let's Encrypt). Autentica no LLDAP pela rede externa `ldap` (host lldap_server:3890).
# Fala com a API do Proxmox VE por HTTPS. Toda customização é por variável de ambiente (ver README e bloco abaixo).
# Obrigatórias: APP_FQDN, PROXMOX_URL, PROXMOX_TOKEN_ID, PROXMOX_TOKEN_SECRET, LDAP_BIND_PASSWORD, JWT_SECRET.
# Pré-req: docker network create web; e a rede externa `ldap` (stack lldap). Stateless (sem volumes).
services:
  app:
    image: ghcr.io/marcelofmatos/orquestrator4proxmox:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - default
      - web
      - ldap
    environment:
      - PORT=8080
      - APP_BRAND=${APP_BRAND:-orquestrator4proxmox}
      - PROXMOX_URL=${PROXMOX_URL}
      - PROXMOX_TOKEN_ID=${PROXMOX_TOKEN_ID}
      - PROXMOX_TOKEN_SECRET=${PROXMOX_TOKEN_SECRET}
      - PROXMOX_TLS_INSECURE=${PROXMOX_TLS_INSECURE:-false}
      - PROXMOX_CLIENT_TAG=${PROXMOX_CLIENT_TAG:-cliente}
      - PROXMOX_HIDDEN_TAGS=${PROXMOX_HIDDEN_TAGS:-mgmt,infra}
      - PROXMOX_TARGET_STORAGE=${PROXMOX_TARGET_STORAGE:-local-zfs}
      # standalone: o lldap é alcançado pelo nome do container (<stack>-server-1) ou pelo alias
      # do serviço `server`. Em Swarm o host é `lldap_server` (ver docker-compose.yml).
      - LDAP_URL=${LDAP_URL:-ldap://lldap-server-1:3890}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-dc=example,dc=com}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-uid=admin,ou=people,dc=example,dc=com}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_REQUIRED_GROUP=${LDAP_REQUIRED_GROUP:-}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_TTL=${SESSION_TTL:-8h}
    labels:
      - traefik.enable=true
      - traefik.docker.network=${PROXY_NET:-web}
      - traefik.http.routers.o4p.rule=Host(`${APP_FQDN}`)
      - traefik.http.routers.o4p.entrypoints=websecure
      - traefik.http.routers.o4p.tls=true
      - traefik.http.routers.o4p.tls.certresolver=letsencryptresolver
      - traefik.http.services.o4p.loadbalancer.server.port=8080
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  ldap:
    external: true
    name: ${LDAP_NET:-ldap}
  default:
    driver: bridge
