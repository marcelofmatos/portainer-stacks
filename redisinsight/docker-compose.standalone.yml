# Stack "redisinsight" (standalone) — Docker SEM Swarm (docker compose / Portainer Compose stack, type 3)
# Variante gerada a partir do docker-compose.yml (Swarm). Diferenças: labels do Traefik no
# CONTAINER (provider docker) + traefik.docker.network; redes overlay -> bridge; `restart` no lugar
# de `deploy` (placement/replicas são do Swarm). Variáveis, portas e detalhes: ver docker-compose.yml e README.
# Pré-requisito: redes externas como BRIDGE (ex.: `docker network create web`; e `data`/`ldap` se a stack usar).
services:
  redisinsight:
    restart: unless-stopped
    image: redis/redisinsight:${REDISINSIGHT_IMAGE_TAG:-latest}
    networks:
    - default
    - web
    - data
    volumes:
    - redisinsight-data:/data
    labels:
    - traefik.enable=true
    - traefik.http.routers.redisinsight.rule=Host(`${REDISINSIGHT_FQDN}`)
    - traefik.http.routers.redisinsight.entrypoints=websecure
    - traefik.http.routers.redisinsight.tls=true
    - traefik.http.routers.redisinsight.tls.certresolver=letsencryptresolver
    - traefik.http.routers.redisinsight.middlewares=redisinsight-auth
    - traefik.http.middlewares.redisinsight-auth.basicauth.users=${REDISINSIGHT_AUTH_BASIC}
    - traefik.http.services.redisinsight.loadbalancer.server.port=5540
    - traefik.docker.network=${PROXY_NET:-web}
networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  data:
    external: true
    name: ${DATA_NET:-data}
  default:
    driver: bridge
volumes:
  redisinsight-data:
    driver: local
