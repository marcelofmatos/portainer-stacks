# ┌───────────────────────────────────────────────────────────────────────────┐
# │ Stack "langfuse" — Langfuse v2 (observabilidade de LLM) + PostgreSQL embarcado │
# └───────────────────────────────────────────────────────────────────────────┘
# Pré-requisitos de deploy:
#   1. Crie as redes externas (uma vez por cluster):
#        docker network create --driver overlay --attachable web
#        docker network create --driver overlay --attachable data
#   2. Tenha a stack `balancer` (Traefik) rodando e o DNS de LANGFUSE_FQDN apontando p/ o host.
#   3. Defina as variáveis OBRIGATÓRIAS no deploy:
#        LANGFUSE_FQDN, LANGFUSE_DB_PASSWORD, LANGFUSE_NEXTAUTH_SECRET, LANGFUSE_SALT.
#   4. Deploy → acesse https://LANGFUSE_FQDN (suba com LANGFUSE_DISABLE_SIGNUP=false p/ criar a 1ª conta).
#
# COMO FUNCIONA:
#   - `langfuse` (app) é publicado pelo Traefik na rede `web`; fala com o banco pela rede interna `default`.
#   - `db` (PostgreSQL) é o banco PRÓPRIO desta stack: NÃO use o `postgres-pgvector` compartilhado.
#       * fica na `default` (o app o acessa pelo nome `db`)
#       * fica TAMBÉM na `data` SÓ para ferramentas de admin (pgadmin4) o alcançarem como `langfuse_db`
#   - Volume dedicado (`db-data`): para migrar de host, basta copiar esse volume. Traces/prompts/custos
#     vivem no banco → o serviço da app é stateless.
#
# VOLUME EM SWARM: volumes são locais ao nó. Em cluster com +1 worker, fixe o serviço `db` no nó
# definindo WORKER_HOSTNAME e descomentando o constraint `node.hostname` abaixo.
# Hardware (1 réplica): mínimo 2 vCPU · 2 GB RAM · 20 GB disco · ideal 4 vCPU · 4 GB RAM · 40 GB disco
services:
  langfuse:
    image: langfuse/langfuse:${LANGFUSE_IMAGE_TAG:-2}
    networks:
      - default # conversa com o banco `db` internamente
      - web # exposto pelo Traefik
    environment:
      - DATABASE_URL=postgresql://${LANGFUSE_DB_USER:-postgres}:${LANGFUSE_DB_PASSWORD}@${LANGFUSE_DB_HOST:-db}:${LANGFUSE_DB_PORT:-5432}/${LANGFUSE_DB_NAME:-langfuse}
      - NEXTAUTH_URL=https://${LANGFUSE_FQDN}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - SALT=${LANGFUSE_SALT}
      - TELEMETRY_ENABLED=${LANGFUSE_TELEMETRY_ENABLED:-true}
      # Signup DESABILITADO por padrão. Defina false só para criar a 1ª conta e habilite de novo.
      - AUTH_DISABLE_SIGNUP=${LANGFUSE_DISABLE_SIGNUP:-true}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - traefik.enable=true
        - traefik.http.routers.langfuse.rule=Host(`${LANGFUSE_FQDN}`)
        - traefik.http.routers.langfuse.entrypoints=websecure
        - traefik.http.routers.langfuse.tls=true
        - traefik.http.routers.langfuse.tls.certresolver=letsencryptresolver
        - traefik.http.services.langfuse.loadbalancer.server.port=3000

  # Banco de dados PRÓPRIO da stack (não compartilhe com outras stacks).
  db:
    image: postgres:${LANGFUSE_DB_IMAGE_TAG:-16-alpine}
    networks:
      - default # acesso do app
      - data # SÓ para ferramentas de admin (pgadmin4) via host `langfuse_db`
    environment:
      - POSTGRES_DB=${LANGFUSE_DB_NAME:-langfuse}
      - POSTGRES_USER=${LANGFUSE_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${LANGFUSE_DB_PASSWORD} # OBRIGATÓRIA
    volumes:
      - db-data:/var/lib/postgresql/data # ← copie este volume para migrar de host
    deploy:
      placement:
        constraints:
          - node.role == worker
          # fixe o db no nó em cluster multi-worker:
          # - node.hostname == ${WORKER_HOSTNAME:-}

networks:
  web: # externa: criada pela stack balancer (Traefik)
    external: true
    name: ${PROXY_NET:-web}
  data: # externa: liga o banco às ferramentas de admin (pgadmin4 etc.)
    external: true
    name: ${DATA_NET:-data}
  default: # interna desta stack: app <-> db
    driver: overlay

volumes:
  db-data:
    driver: local
