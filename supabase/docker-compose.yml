# Stack "supabase" — Supabase self-hosted (Docker Swarm)
#
# ADAPTAÇÃO best-effort do compose oficial (github.com/supabase/supabase, docker/) para Swarm.
# Proxy: Traefik v3 na rede externa `web`, TLS Let's Encrypt (certresolver=letsencryptresolver).
# Exposição: APENAS Studio (Host SUPABASE_STUDIO_FQDN) e Kong/API (Host SUPABASE_API_FQDN).
# Os demais serviços (db/auth/rest/realtime/storage/...) ficam só na rede interna `default`.
#
# Arquivos de config são montados de ./config/... (o Portainer clona o repo, então o caminho
# relativo funciona). Eles NÃO contêm segredos — usam placeholders/variáveis ($VAR).
#
# Toda customização é feita por variáveis de ambiente (ver README).
# Segredos OBRIGATÓRIOS (sem default): POSTGRES_PASSWORD, JWT_SECRET, ANON_KEY, SERVICE_ROLE_KEY,
#   DASHBOARD_USERNAME, DASHBOARD_PASSWORD, SECRET_KEY_BASE, VAULT_ENC_KEY, LOGFLARE_API_KEY.
#
# NOTA (Swarm): depends_on/healthchecks de "condition: service_healthy" NÃO são honrados pelo
#   Swarm como no compose v2 — a ordem de boot é best-effort. Os serviços têm restart automático;
#   em caso de "race" no primeiro deploy, alguns reiniciam até o `db`/`analytics` ficarem prontos.
#
# NOTA (volumes em Swarm): volumes são locais ao nó. Em cluster com mais de um worker, fixe os
#   serviços com volume (db) definindo WORKER_HOSTNAME e descomentando o constraint de hostname.
# Porte: Pesado (2 GB → 4–8 GB RAM)
# Hardware (1 réplica): mínimo 2 vCPU · 4 GB RAM · 40 GB disco · ideal 4 vCPU · 8 GB RAM · 80 GB disco

x-deploy-worker: &deploy-worker
  mode: replicated
  replicas: 1
  placement:
    constraints:
      - node.role == worker

services:

  studio:
    image: supabase/studio:${STUDIO_IMAGE_TAG:-20240422-5cf8f30}
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Default Organization}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-Default Project}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-https://${SUPABASE_API_FQDN}}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    networks:
      - default
      - web
    deploy:
      <<: *deploy-worker
      labels:
        - traefik.enable=true
        - traefik.http.routers.supabase-studio.rule=Host(`${SUPABASE_STUDIO_FQDN}`)
        - traefik.http.routers.supabase-studio.entrypoints=websecure
        - traefik.http.routers.supabase-studio.tls=true
        - traefik.http.routers.supabase-studio.tls.certresolver=letsencryptresolver
        - traefik.http.services.supabase-studio.loadbalancer.server.port=3000

  kong:
    image: kong:${KONG_IMAGE_TAG:-2.8.1}
    # https://unix.stackexchange.com/a/294837 — expande variáveis no kong.yml em runtime
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./config/kong.yml:/home/kong/temp.yml:ro
    networks:
      - default
      - web
    deploy:
      <<: *deploy-worker
      labels:
        - traefik.enable=true
        - traefik.http.routers.supabase-api.rule=Host(`${SUPABASE_API_FQDN}`)
        - traefik.http.routers.supabase-api.entrypoints=websecure
        - traefik.http.routers.supabase-api.tls=true
        - traefik.http.routers.supabase-api.tls.certresolver=letsencryptresolver
        - traefik.http.services.supabase-api.loadbalancer.server.port=8000

  auth:
    image: supabase/gotrue:${GOTRUE_IMAGE_TAG:-v2.149.0}
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-https://${SUPABASE_API_FQDN}}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-https://${SUPABASE_STUDIO_FQDN}}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS:-false}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@example.com}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-supabase-mail}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-2500}
      GOTRUE_SMTP_USER: ${SMTP_USER:-fake_mail_user}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-fake_mail_password}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-fake_sender}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}
      GOTRUE_EXTERNAL_PHONE_ENABLED: ${ENABLE_PHONE_SIGNUP:-true}
      GOTRUE_SMS_AUTOCONFIRM: ${ENABLE_PHONE_AUTOCONFIRM:-true}
    networks:
      - default
    deploy:
      <<: *deploy-worker

  rest:
    image: postgrest/postgrest:${POSTGREST_IMAGE_TAG:-v12.0.1}
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    command: "postgrest"
    networks:
      - default
    deploy:
      <<: *deploy-worker

  realtime:
    image: supabase/realtime:${REALTIME_IMAGE_TAG:-v2.28.32}
    environment:
      PORT: 4000
      DB_HOST: ${POSTGRES_HOST:-db}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"
    networks:
      default:
        # realtime monta o tenant id pelo subdomínio; precisa deste alias para o Kong roteá-lo
        aliases:
          - realtime-dev.supabase-realtime
    deploy:
      <<: *deploy-worker

  storage:
    image: supabase/storage-api:${STORAGE_IMAGE_TAG:-v1.0.6}
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: ${STORAGE_FILE_SIZE_LIMIT:-52428800}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage:/var/lib/storage
    networks:
      - default
    deploy:
      <<: *deploy-worker
      # NOTA: 'storage' usa volume local (arquivos). Em cluster multi-worker, fixe-o no
      # mesmo nó do volume (ou use backend S3) — descomente o constraint de hostname.
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}

  imgproxy:
    image: darthsim/imgproxy:${IMGPROXY_IMAGE_TAG:-v3.8.0}
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION:-true}
    volumes:
      - storage:/var/lib/storage
    networks:
      - default
    deploy:
      <<: *deploy-worker
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}

  meta:
    image: supabase/postgres-meta:${POSTGRES_META_IMAGE_TAG:-v0.80.0}
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${POSTGRES_HOST:-db}
      PG_META_DB_PORT: ${POSTGRES_PORT:-5432}
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - default
    deploy:
      <<: *deploy-worker

  functions:
    image: supabase/edge-runtime:${EDGE_RUNTIME_IMAGE_TAG:-v1.45.2}
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      VERIFY_JWT: "${FUNCTIONS_VERIFY_JWT:-false}"
    volumes:
      - ./config/functions:/home/deno/functions:ro
    command:
      - start
      - --main-service
      - /home/deno/functions/main
    networks:
      - default
    deploy:
      <<: *deploy-worker

  analytics:
    image: supabase/logflare:${LOGFLARE_IMAGE_TAG:-1.4.0}
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: ${POSTGRES_DB:-postgres}
      DB_HOSTNAME: ${POSTGRES_HOST:-db}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
      LOGFLARE_SINGLE_TENANT: "true"
      LOGFLARE_SUPABASE_MODE: "true"
      LOGFLARE_MIN_CLUSTER_SIZE: 1
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true
    networks:
      - default
    deploy:
      <<: *deploy-worker

  db:
    image: supabase/postgres:${POSTGRES_IMAGE_TAG:-15.1.1.41}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT:-5432}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - ./config/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ./config/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ./config/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./config/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./config/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - db-data:/var/lib/postgresql/data
      - db-config:/etc/postgresql-custom
    networks:
      - default
    deploy:
      <<: *deploy-worker
      # NOTA: o `db` persiste em volume local. Em cluster multi-worker, fixe-o no nó do volume
      # definindo WORKER_HOSTNAME e descomentando o constraint de hostname abaixo.
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == ${WORKER_HOSTNAME:-}

  vector:
    image: timberio/vector:${VECTOR_IMAGE_TAG:-0.28.1-alpine}
    environment:
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
    volumes:
      - ./config/vector.yml:/etc/vector/vector.yml:ro
      - ${DOCKER_SOCKET_LOCATION:-/var/run/docker.sock}:/var/run/docker.sock:ro
    command: [ "--config", "etc/vector/vector.yml" ]
    networks:
      - default
    deploy:
      <<: *deploy-worker

networks:
  web:
    external: true
    name: ${PROXY_NET:-web}
  default:
    driver: overlay

volumes:
  db-data:
    driver: local
  db-config:
    driver: local
  storage:
    driver: local
